spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/url_shortener
    username: ${DB_USERNAME:url_admin}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080